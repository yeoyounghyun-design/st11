<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>grid 미리보기</title>
  <link rel="stylesheet" href="../reset.css">
  <!-- grid
   1. container에게 grid 선언 (container)
   2. 행렬 줄칸갯수, 크기 (container)
   3. 암시적 그리드선언 (생략가능) (container)
   4. 아이템배치 (item) (생략 한줄한칸)
   5.여백
   6.정렬
   -->
   
  <style>
    /* 모양 */
    .grid-container{
      background-color: #ccc;
      gap: 10px;
    }
    .grid-container .item{
      background-color: dodgerblue;
    }
    /* grid */
    .grid-container{
      display: grid;
      grid-template-rows: 100px 100px;
      grid-template-columns: 100px 100px 100px;
      grid-auto-rows: 100px;
    }
    .grid-container .item{
      
    }
    .grid-container .item:nth-child(1){
     grid-column: 1/3;
    }
    .grid-container .item:nth-child(2){
      grid-column: 3/4;
      grid-row: 1/3;
    }
    .grid-container .item:nth-child(3){
      grid-column: -1/-3;
    }
    .grid-container .item:nth-child(4){
      grid-row: 4/2;
    }
    .grid-container .item:nth-child(5){
      grid-column: 2/3;
      grid-row: 2/3;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="grid-container">
      <!-- .item*8{아이템$} -->
      <div class="item">아이템1</div>
      <div class="item">아이템2</div>
      <div class="item">아이템3</div>
      <div class="item">아이템4</div>
      <div class="item">아이템5</div>
      <div class="item">아이템6</div>
      <div class="item">아이템7</div>
      <div class="item">아이템8</div>
    </div>
  </div>
</body>
</html>
