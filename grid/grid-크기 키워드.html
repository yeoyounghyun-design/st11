<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>grid1 행열의 크기지정 키워드 </title>
  <link rel="stylesheet" href="../reset.css">
  <!-- grid 
  1. container에게 grid선언(container)
  2. 행열 줄칸갯수, 크기 (container)
  3. 암시적 그리드선언 (생략가능)(container)
  4. 아이템배치 (item) (생략 한줄한칸)
  5. 여백
  6. 정렬
  -->

  <style>
    .wrap{
      margin:50px;
    }
    /* 모양 */
    .grid-container{
      background-color: #ccc;
    }
    .grid-container .item{
      background-color: dodgerblue;
      border: 1px solid magenta;
      box-sizing: border-box;

    }

    /* grid */
    .grid-container{
      display: grid;
      /* 2 */
      grid-template-rows: repeat(3, 100px);
      /* 크기 auto : 컨테이너에 남은공간 */
      grid-template-columns: 100px auto 2rem;
      /* fr */
      grid-template-columns: 3fr 3fr 3fr 3fr;
      /* repeat() */
      grid-template-columns: repeat(4,3fr);
      /* minmax(최소값, 최대값)
      최소값 fr단위를 사용하지 못합니다.
      */
      grid-template-columns: repeat(4, minmax(150px, 1fr)) ;
      grid-template-columns: repeat(3, minmax(150px, 33.33%)) ;
      /* fit-content(최대크기) 
         아이템의 내용이 최대크기보다 크지 않을경우 content(내용)에 맞추고 내용이 제한한 최대크기보다 커질때는 최대크기만 유지

      */
      /* 300px 보다 아이템 내용이 작을 경우 내용크기, 아니면 300이상은 커지지 말라아 */
      grid-template-columns: repeat(3, fit-content(300px));
    }
    
    /* grid item */
    .grid-container .item{

    }
     .grid-container .item:nth-child(1){
     }
     .grid-container .item:nth-child(2){
     }
     .grid-container .item:nth-child(3){
     }
     .grid-container .item:nth-child(4){
     }
     .grid-container .item:nth-child(5){
     }
     .grid-container .item:nth-child(6){
     }


  </style>

</head>
<body>
  <div class="wrap">
    <div class="grid-container">
       <div class="item">Lorem ipsum dolor sit.</div>
      <div class="item">Lorem ipsum dolor sit amet 
        consectetur adipisicing elit. Necessitatibus, reprehenderit.</div>
      <div class="item">아이템3</div>
      <div class="item">아이템4</div>
      <div class="item">아이템5</div>
      <div class="item">아이템6</div>
      <div class="item">아이템7</div>
      <div class="item">아이템8</div>
    </div>
  </div>
</body>
</html>
