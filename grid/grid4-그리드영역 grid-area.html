<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>grod4- 그리드영역 grid-area</title>
  <link rel="stylesheet" href="../reset.css">
  <style>
    .wrap{
      /* 1 */
      display: grid;
      /* 2 행열 갯수, 크기 
      3줄 헤더, 콘테츠, 푸터
      2칸 1c 고정픽셀250px 2차 여유공간 다
      */
      grid-template-rows: 150px minmax(500px, auto) 300px;
      grid-template-columns: 250px 1fr;
      /* 7 그리드 영역이름 활용 (생략가능)*/
      grid-template-areas: 
       "hd hd"
       "lnb mc"
       ". footer"
      ;
    }
    header{
      background-color: #ccc;
      /* 영역명은 변수처럼 사용하니 따옴표를 붙이면 텍스트가 됩니다 */
      grid-area: hd;
    }
    aside{
      background-color: #fcc;
      grid-area: lnb;
    }
    .main-content{
      background-color: #ccf;
      grid-area: mc;
    }
    footer{
      background-color: #cfc;
      grid-area: footer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>헤더</header>
    <aside>LNB</aside>
    <main class="main-content">페이지내용</main>
    <footer>푸터</footer>
  </div>
</body>
</html>
