<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>background-attachment</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      .box {
        /* height: 300px; */
        /* box-sizing: content-box;
        width/height 계산법을
        border + padding + content 크기를 지정
         */
         
        box-sizing: border-box;
        height: 100vh;
        border: 10px dotted rgba(0, 0, 0, 0.5);
        padding: 20px;
        background-color: #ff3;
        font-size: 2em;
        text-align: left;
       
        background-image: url(background-image/images/frame.png);
        background-repeat: no-repeat;
        background-position: right top;
      
  
      }

    /* 
    배경 이미지가 요소에 붙어있는 방법 설정
    background-attachment: scroll;
    scroll 초기값, 요소와 함께 스크롤 되어라
    
    background-attachment: fixed;
    배경이 브라우저에 fixed 고정되어라.
    배경이미지의 기준이 브라우저가됩니다.
    */
      
      .box1 {
        width: 500px;
        background-attachment: scroll;
      }
      .box2 {
        width: 80%;
      background-attachment: fixed;
      /* background-position을 브라우저 기준 */
      background-position: left center;
      }
      .box3 {
        width: 10em;
      
      }
      .box4 {
        width: auto;
      }
        
    </style>
  </head>
  <body>
    <!-- .cotainer-wrap>.box.box$*3>{box$} -->
    <div class="cotainer-wrap">
      <div class="box box1">box1</div>
      <div class="box box2">box2</div>
      <div class="box box3">box3</div>
      <div class="box box4">box4</div>
    </div>
  </body>
</html>
