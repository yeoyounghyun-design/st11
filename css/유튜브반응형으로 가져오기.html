<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>유튜브 반응형으로 가져오기</title>
  <style>
    *{margin:0;padding:0;}
    body{margin:50px;}
    .media-box{max-width:768px;}
    .iframe-wrap{
      width:100%;
      aspect-ratio: 16/9;
      background-color: #ccc;
    }
    .iframe-wrap iframe{
      display: block;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="media-box">
    <div class="iframe-wrap">
      <iframe  src="https://www.youtube.com/embed/Kz2BsKX04ek?si=U9bF5BPIkZWhSK_f" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    </div>
  </div>
</body>
</html>
