<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>히어로</title>
   <style>
    *{margin:0; padding:0;}
    /* .hero-banner의 부모의 콘텐츠 영역 너비를 다사용 
    .wrap의 콘텐츠 영역 너비를 다사용 
    */
    .hero-banner{width:100%;}
    .hero-banner picture{
      display: block;
      background-color: #f00;
    }
    .hero-banner picture source,
    .hero-banner picture img{
      width:100%;
      display: block;
    }

    @media (max-width:768px){
       .hero-banner picture source,
       .hero-banner picture img{
        opacity: 0.5;
      width:100%;
      height: calc(100vh - (50px + 50px));
      object-fit: cover;
      object-position: left bottom;
    }
    }/* @media (max-width:768px){*/
  </style>
</head>
<body>
  
  <div class="wrap">
    <div class="hero-banner">
      <!-- 
      picture 태그 자식인 source 태그 입력 순으로 브라우저에 표시할 수있는지 여부를 확인하고 할수 없으면 다음 source를 표시하려고 안되면 -> 또다음 source를 표시하려고 안되면
      모든 source를 표시할수 최종 image를 적용
      여부 media="" 결정
      -->
      <picture>
        <source srcset="../background-image/smartbanner-01-01-mobile.png" media="(max-width:768px)" >
        <img src="../background-image/smartbanner-01-01-pc.png" alt="">
      </picture>
    </div>
  </div>
</body>
</html>
