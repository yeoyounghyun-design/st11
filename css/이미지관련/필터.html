<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>필터</title>
  <style>
     *{margin:0; padding:0;}
    .wrap{}
     .visual-section{
      width:100%;
      height: 100vh;
      background-color: #97948d;
      /* 자식 inline-block을 right 정렬 */
      text-align: right;
      align-content: center;
      /*  .visual-section::after{ 기준요소를 위해 */
      position: relative;
    }
    .img-wrap{
      height: 100%;
      display: inline-block;
    }
    .img-wrap img{
      height: 100%;
      display: block;
      filter:blur(5px) grayscale(100%);
      
    }
  </style>
</head>
<body>
  <div class="visual-section">
    <div class="img-wrap">
      <img src="../images/background-test.jpg" alt="">
    </div>
    <div class="text-wrap"></div>
  </div>
</body>
</html>
