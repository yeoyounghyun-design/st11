<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>부모의너비를 따르는 이미지</title>
  <style>
    *{margin:0; padding:0;}
    .wrap{margin:30px;}
    .img-wrap{
      /* width:auto; */
      background-color: #f00;
    }
    /* 부모의 너비랑 상관없이 이미지는 항상 부모의 너비를 따라서 자동 조절 */
    .img-wrap img{
      width:100%;
      /* height: auto;  이미지의 가로세로 비율을 유지*/
      display: block;
      opacity: 0.5;/*텍스트 삭제*/
    }

    /* 부모의 너비를 따르지만 자신의 크기보다는 더 커지지 않아야 할 때 */
    .max-img{
      width: 80%;
      background-color: #0f0;
    }
    .max-img img{
      opacity: 0.5;/*test 삭제*/
      /* 부모의 너비를 따르지만 자기 크기 보다는 커지지 말아라 */
      width: auto;
      max-width: 100%;
    }
    .img-wrap2{
      background-color: #00f;
    }
    .img-wrap2 img{
      opacity: 0.5; /*테스트 삭제*/
      height: 100%;
      /* width: auto; */
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="img-wrap">
      <img src="../background-image/smartbanner-01-01-pc.png" alt="원피스 할인 이벤트">
    </div>
    <div class="max-img">
      <img src="../background-image/smartbanner-01-01-mobile.png" alt="">
    </div>
    <div class="img-wrap2">
      <img src="../background-image/smartbanner-01-01-mobile.png" alt="">
    </div>
  </div>
  <!-- //.wrap -->
</body>
</html>
