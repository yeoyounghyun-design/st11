<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>position1</title>
  <style>
    *{margin:0;padding:0; box-sizing: border-box;}
    .wrap{
      width:85%;
      width:65%; min-height: 2000px;
      margin:0 auto;
      background-color: #ccc;
      padding:30px;
      border: 10px dashed #999;
      position: relative;/*3번째 parent의 기준요소*/
    }
    .parent{
      padding:10px;

    }
    .parent:nth-child(1){
      background-color: #f86;
      position:static;
      /* 기준x */
      /* 일반 흐름 o */
      /* 레이어 x */
      left:150px; top:150px;
    }
    .parent:nth-child(2){
      background-color: #6f8;
      position:relative;
      /* 기준은 자신 */
      /* 형제, 부모에게 레이아웃의 영향을 안좋아 - normal flow o*/
      /* 레이어 요소가됩니다. z-index */
      left:150px; top:150px;

    }
    .parent:nth-child(3){
      background-color: #86f;
      position: absolute;
      /* 기준을 가까운 조상의 position:static을 제외한 값으로  */
      /* 형제,부모의 레이아웃에 영향을 줍니다. -normal flowx */
      /* 부모자식의 관계을 잃어요
      부모가 해당요소의 높이를 인식하지x
      부모의 너비를 알지x
      */
      /* 레이어 요소가됩니다. z-index*/
      /* left/right/top/bottom 을 지정하지 않으면 원래 자기 위치 */
      left:0; top:0;
    }
    .parent:nth-child(4){
      background-color: #cf6;
       /* 기준을 브라우저 */
      /* 형제,부모의 레이아웃에 영향을 줍니다. -normal flow x */
      /* 부모자식의 관계을 잃어요
      부모가 해당요소의 높이를 인식하지x
      부모의 너비를 알지x 콘텐츠 영역만큼의 너비
      */
      /* 레이어 요소가됩니다. z-index */
      /* left/right/top/bottom 을 지정하지 않으면 원래 자기 위치 */
      position:fixed;
      left:0; top:0;

    }
    .parent:nth-child(5){
       background-color: #c8f;
    }
   
    .parent .child{
       width:50px; height: 50px;
       padding:10px;
       /* position:absolute; */
       /* normal flow 벗어나요
          부모가 해당의 요소의 높이를 인식하지 못해요
          본인의 부모의 콘텐츠의 영역으로 가져오지 못해요
          자신의 콘텐츠 크기만큼의 너비로 줄어들어요
          기준요소?
          가까운 조상부터 position이 설정된 요소(단 static)
       */
       left:0; top:0;
    }
    .parent .child:nth-child(1){
      background-color: #fff;
    }
    .parent .child:nth-child(2){
      background-color: #0dd;
    }
    .box{
      background-color: #dd0;
    }
      .parent:nth-child(5) .child{
        position: static;
      }
    /* 요소의 위치 설정 법 지정 position */
  </style>
</head>
<body>
  <div class="wrap">
    <!-- .parent*5>.child*2>.box>{box$} -->
    <div class="parent">
      <div class="child">
        <div class="box">box1</div>
      </div>
      <div class="child">
        <div class="box">box2</div>
      </div>
    </div>
    <div class="parent">
      <div class="child">
        <div class="box">box1</div>
      </div>
      <div class="child">
        <div class="box">box2</div>
      </div>
    </div>
    <div class="parent">
      <div class="child">
        <div class="box">box1</div>
      </div>
      <div class="child">
        <div class="box">box2</div>
      </div>
    </div>
    <div class="parent">
      <div class="child">
        <div class="box">box1</div>
      </div>
      <div class="child">
        <div class="box">box2</div>
      </div>
    </div>
    <div class="parent">
      <div class="child">
        <div class="box">box1</div>
      </div>
      <div class="child">
        <div class="box">box2</div>
      </div>
    </div>
  </div>
</body>
