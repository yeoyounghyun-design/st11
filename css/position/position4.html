<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>position 4 1줄 4단 상품, 상품카드 좋아요, 세일 이미지랑 겹쳐서

  </title>
  <style>
    /* reset */
    *{margin: 0; padding: 0;}
    ol,ul{list-style: none;}
    
    .wrap{
      background-color: beige;
      margin:30px;
    }

    /* 상품카드 썸네일 */
    .ec-base-product{
      
    }
    .ec-base-product .prdList{
      background-color: #333;
      border: 1px solid #f00;
    }
    /*  float 단처리 레이아웃 */
    /* float가 지정된 자식요소를 인식하지못하는 문제해결 */
     .ec-base-product .prdList::after{
      content:"";
      display: block;
      clear: both;
     }

    .prdList li{
      /* 1줄의 4단 상품 표시 */
      float: left; /*normal flow x*/
      width:25%;
      /* 테스트용 border를 width 포함 */
      box-sizing: border-box;
      background-color: #cc0;/*테스트 후 삭제*/
      border: 1px solid #000;/*테스트 후 삭제*/

    }
    .prdList li .prdList__item{
      position: relative; /*.sale_box .likeButton 기준*/
    }
    .prdList li .prdList__item .thumbnail{}
    .prdList__item .thumbnail img{
      opacity: 0.5; /*테스트 후 삭제*/
      /* 이미지를  자신의 부모의 크기에 맞게 자동 조절 되게 하고 싶어요 */
      /* 이미지가 부모의 콘텐츠 너비를 다 사용 */
      /* 이미지가 부모의 콘텐츠 너비를 자동 조절 */
      width:100%;
      display: block;
    }
    /* 상품아이템의 오른쪽 위  */
    /* 
   누가?.sale_box 
      배치법? position:absolute;
            기준이 되는 요소가 다른 요소 
      위치? 오른쪽 위   right:5px; top:5px;
      기준 상품아이템  .prdList__item
          position:relative;
    
    */
    .prdList__item .thumbnail .sale_box{
      position: absolute;
      right: 5px; top:5px;
    }
    /* 상품아이템의 왼쪽위 */
    /* 
    누가? .likeButton
        배치법? position:absolute;
           기준이 되는 요소가 다른 요소 
        위치? 왼쪽 위   left:5px; top:5px;
        기준 상품아이템  .prdList__item
            기준이 되는 요소에게  position:relative;
    */

    .prdList__item .thumbnail .likeButton{
      position:absolute;
      left:5px; top:5px;
    }

  </style>
</head>
<body>
  <!-- 
  float 단처리 레이아웃
  position, left/right/top/bottom 요소를 배치
  -->
  <div class="wrap">
