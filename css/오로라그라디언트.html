<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>오로라 메시 그라디언트</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      min-height: 100vh;
      background: #050513;
      font-family: "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      color: #fff;
    }

    .exam {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at 15% 20%, rgba(210, 43, 247, 0.48), transparent 18%),
                  radial-gradient(circle at 85% 20%, rgba(206, 247, 43, 0.38), transparent 16%),
                  radial-gradient(circle at 60% 40%, rgba(126, 124, 231, 0.45), transparent 21%),
                  radial-gradient(circle at 30% 70%, rgba(231, 202, 14, 0.34), transparent 18%),
                  radial-gradient(circle at 70% 70%, rgba(206, 247, 43, 0.25), transparent 19%),
                  radial-gradient(circle at 50% 50%, rgba(210, 43, 247, 0.16), transparent 24%),
                  linear-gradient(135deg, #080816 0%, #10102f 45%, #0a0a22 100%);
    }

    .exam::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 45% 25%, rgba(210, 43, 247, 0.55), transparent 20%),
                  radial-gradient(circle at 75% 35%, rgba(206, 247, 43, 0.42), transparent 18%),
                  radial-gradient(circle at 25% 60%, rgba(126, 124, 231, 0.5), transparent 22%),
                  radial-gradient(circle at 80% 80%, rgba(231, 202, 14, 0.32), transparent 16%);
      mix-blend-mode: screen;
      opacity: 0.95;
      pointer-events: none;
    }

    .text-area {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 720px;
    }

    .text-area h1 {
      font-size: clamp(3rem, 6vw, 5rem);
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      margin-bottom: 0.8rem;
    }

    .text-area p {
      font-size: clamp(1rem, 1.8vw, 1.4rem);
      color: rgba(255, 255, 255, 0.9);
      line-height: 1.7;
      text-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
    }
  </style>
</head>
<body>
  <div class="exam">
    <div class="text-area">
      <h1>GRADIENT OVER DESIGN</h1>
      <p>텍스트 위치만 잡아두었습니다. 내용을 원하는 대로 수정하세요.</p>
    </div>
  </div>
</body>
</html>
