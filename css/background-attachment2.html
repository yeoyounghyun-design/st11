<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>background-attachment 2</title>
  <style>
    *{margin:0; padding:0;}
    .container-wrap{
      margin:0 50px;
      /* margin:0; */
      /* margin:0 50px; */
      margin:0;
      background-color: #ccc;
    }
    .container-wrap > section{
      /* 부모요소의 콘텐츠 영역을 다쓰겠다 */
      box-sizing: border-box;
        width:100%;
        padding:1em;
        /* 브라우저의 viewport 높이 다 차지 */
        height: 100vh;
      /* margin:0 -50px; */
      background-image: url(background-image/images/bg.jpg);
      
      background-image: url(background-image/images/sun.png);
      background-repeat: no-repeat;
      background-color:#ac9

    }
   
    .container-wrap > .section1{
      background-color: rgba(255, 136, 102, 0.2);
      background-position: 0 0;
      /* background-image: none; */
      background-attachment: scroll;
    }
    
    .container-wrap > .section2{
      background-color: rgba(102, 136,255, 0.2);
      /* background-position: right bottom; */
     
      /* background-attachment: scroll; */
      background-attachment: fixed;
       background-position: center;
       /* 브라우저를 기준으로 배경이 이미지를 가운데 기준으로 배치 */
      /* 
      fixed
      배겨이미지의 기준이 요소가 아니라 브라우저가 됩니다.
      background-position: right bottom;
      브라우저의 오른쪽 아래 기준이 이미지가 배치
      */
    }
    
    .container-wrap > .section3{
      background-color: rgba(102,255,136,0.2);
      background-position: 100% 0;
      /* background-image: none; */
      background-attachment: scroll;
    }
  </style>
</head>
<body>
  <div class="container-wrap">
    <!-- section.section$*3>p.title>{setion$} -->
    <section class="section1">
      <p class="title">setion1</p>
    </section>
    <section class="section2">
      <p class="title">setion2</p>
    </section>
    <section class="section3">
      <p class="title">setion3</p>
    </section>
  </div>
</body>
