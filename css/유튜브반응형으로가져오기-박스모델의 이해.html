<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>유튜브 반응형으로 가져오기  - 박스모델의 이해</title>
  <style>
    *{margin:0; padding:0;}
    body{margin:50px;}
    /* 부모의 너비르 따르지만 768px 이상은 되지 마라 */
    .media-box{max-width: 768px;
    background-color: #bbb;}
    .iframe-wrap{
      background-color: #ccf;
      width:500px; 
      /* 해당요소의 콘텐츠 영역은 수직 크기는0 */
      height: 500px;     padding-top:500px;      box-sizing: border-box;
      /* overflow: hidden; */
      /*   .iframe-wrap .box{ 기준요소가 되기  */
      position: relative;
    }
    .iframe-wrap .box{
      opacity: 0.5;
      background-color: #f00;
      /* 부모의 콘텐츠 영역을 다 사용 */
      /* width:100%;      height: 100%; */
      /* 
      기준 ; 가까운 조상중 position static제외 한 설정값이 있는 요소
        0,0 을 잡아주는 요소
      일반흐름 ? 벗어나요

      */
      position: absolute;
      left:0; top:0;
      /* 기준요소의 콘텐츠 영역을 사용 */
      width:100%;      height: 100%; 
    }
  </style>
</head>
<body>
  <div class="media-box">
    <div class="iframe-wrap">
       <div class="box">Lorem ipsum dolor sit amet consectetur adipisicing elit. Magnam praesentium expedita necessitatibus deserunt nemo! Quaerat error neque laboriosam omnis ex fugit repudiandae quam rerum asperiores sed. Impedit, ducimus quibusdam? Magnam!</div>
    </div>
  </div>
</body>
</html>
