<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오로라 메시 그라디언트</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .exam {
            width: 100%;
            height: 100vh;
            background: 
                radial-gradient(ellipse at 20% 30%, rgba(0, 255, 255, 0.6) 0%, transparent 40%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 0, 255, 0.6) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 70%, rgba(231, 202, 14, 0.6) 0%, transparent 40%),
                radial-gradient(ellipse at 70% 60%, rgba(128, 0, 255, 0.5) 0%, transparent 50%),
                radial-gradient(ellipse at 30% 60%, rgba(0, 255, 150, 0.4) 0%, transparent 45%),
                radial-gradient(ellipse at 60% 40%, rgba(255, 0, 127, 0.4) 0%, transparent 45%),
                linear-gradient(135deg, rgba(30, 10, 50, 0.3) 0%, rgba(20, 40, 60, 0.3) 100%);
            background-size: 200% 200%, 180% 180%, 220% 220%, 200% 200%, 190% 190%, 210% 210%, 100% 100%;
            background-position: 0% 0%, 100% 100%, 0% 100%, 50% 50%, 100% 0%, 0% 50%, 0% 0%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .text-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }

        .text-container h1 {
            font-size: 4rem;
            color: white;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5),
                         0 0 40px rgba(0, 255, 255, 0.3);
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .text-container p {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.9);
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5),
                         0 0 20px rgba(255, 0, 255, 0.2);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="exam">
        <div class="text-container">
            <h1>Aurora Mesh</h1>
            <p>Gradient Background</p>
        </div>
    </div>
</body>
</html>
