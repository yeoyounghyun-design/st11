<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>border-radius2</title>
  <style>
    *{margin: 0; padding: 0;}
    body{margin: 50px;
    }
    .box{
      width: 300px;
      height: 400px;
      border: 1px solid #000;
      border-radius: 50px;
      overflow: hidden;
    }
    .child{
      background-color: 
     rgba(183, 141, 63, 0.5);
      height: 100%;
    }
    /* 자식의 크기가 부모크기보다 넘쳐날때 
    overflow 
    */

  </style>
</head>
<body>
  <div class="box">
   <div class="child">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Optio, 
    repudiandae animi? Obcaecati impedit quam, atque corporis soluta doloribus ratione 
    recusandae.</div>
    </div>
</body>
</html>
