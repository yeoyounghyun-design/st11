<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>table1 </title>
  <style>
    *{margin: 0;padding: 0;}
    body{margin: 50px;}
    table{
      border:1px solid #000;
      margin-bottom: 20px;
    }
    table, tr, th, td{
      box-sizing: border-box;
    }
    tr{border:1px solid #f00}
    th,td{border:1px solid #00f}

    .table1{
      border-collapse: separate;
      width: 500px;
    }
    .table1 th:nth-child(1),
    .table1 td:nth-child(1){
      width:200px;
    }
    .table2{
      border-collapse: collapse;
      width:80%;
    }
    .table2 th:nth-child(1),
    .table2 td:nth-child(1){
      width:100px;
    }
    .table2 th:nth-child(3),
    .table2 td:nth-child(3){
      width:80px;
    }
    .table2 th:nth-child(4),
    .table2 td:nth-child(4){
      width:80px;
    }
  </style>
</head>
<body>
  <table class="table1">
    <!-- tr>th*4>{제목$} -->
    <tr>
      <th>제목1</th>
      <th>제목2</th>
      <th>제목3</th>
      <th>제목4</th>
    </tr>
    <!-- tr*2>td*4>{내용$} -->
    <tr>
      <td>Lorem, ipsum.</td>
      <td>내용2</td>
      <td>내용3</td>
      <td>내용4</td>
    </tr>
    <tr>
      <td>내용1</td>
      <td>내용2</td>
      <td>내용3</td>
      <td>내용4</td>
    </tr>
  </table>
  <table class="table2">
    <!-- tr>th*4>{제목$} -->
    <tr>
      <th>제목1</th>
      <th>제목2</th>
      <th>제목3</th>
      <th>제목4</th>
    </tr>
    <!-- tr*2>td*4>{내용$} -->
    <tr>
      <td>내용1</td>
      <td>Lorem, ipsum.</td>
      <td>내용3</td>
      <td>내용4</td>
    </tr>
    <tr>
      <td>내용1</td>
      <td>내용2</td>
      <td>내용3</td>
      <td>내용4</td>
    </tr>
  </table>
</body>
</html>
