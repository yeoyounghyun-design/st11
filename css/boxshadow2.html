<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>box-shadow 2</title>
  <style>
    *{margin: 0; padding: 0;}
    body{background-color: #ccc;}
    header{
      background-color: #fff;
      width: auto;
      height: auto;
      min-height: 100px;
      border-bottom: 1px solid #aaa;
      box-shadow: 0px 4px 4px #999;
    }
  </style>

</head>
<body>
  <header>헤더</header>

</body>
</html>
