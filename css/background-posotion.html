<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>background-position</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      .box {
        height: 300px;
        border: 10px dotted rgba(0, 0, 0, 0.5);
        background-color: #ff3;
        font-size: 2em;
        text-align: center;

        background-image: url(background-image/images/frame.png);
        background-repeat: no-repeat;
        background-repeat: repeat;
        /* 배경이미지가 요소보다 작을 경우 반복되는 것을 설정
         background-repeat:값
        repeat 기본값
        no-repeat
        repeat-x
        repeat-y
        */
      }

      /* 
      background-position
      배경의 기준이 될 위치를 지정
      배경이미지의 기본 요소의 왼쪽 위 가 기본값
      */
      .box1 {
        width: 500px;
        background-position: 0 0;
        background-position: left top;
        /* 배경이미지의 기본 요소의 왼쪽 위 가 기본값 */
      }
      .box2 {
        width: 80%;
        background-position: 100% 50%;
        /* 배경의 이미지를 오른쪽100%  가운데 50% 가 기준*/
        background-position: right center;
      }
      .box3 {
        width: 10em;
        /* 배경이미지가 요소의 가운데 기준 */
        background-position: center center;
        background-position: center;
        background-position: 50%;
      }
      .box4 {
        width: auto;
        background-color: #fff;
        background-image: url(background-image/images/sun.png);
        background-position: 100px 20px;
      }
        
    </style>
  </head>
  <body>
    <!-- .cotainer-wrap>.box.box$*3>{box$} -->
    <div class="cotainer-wrap">
      <div class="box box1">box1</div>
      <div class="box box2">box2</div>
      <div class="box box3">box3</div>
      <div class="box box4">box4</div>
    </div>
  </body>
</html>
