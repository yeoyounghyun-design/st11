<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>수평수직 가운데 만들기</title>
  <!-- 웹폰트 불러오기 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">
<!-- 

.noto-sans-kr-<uniquifier> {
  font-family: "Noto Sans KR", sans-serif;
  font-optical-sizing: auto;
  font-weight: <weight>;
  font-style: normal;
}
  .nanum-pen-script-regular {
  font-family: "Nanum Pen Script", cursive;
  font-weight: 400;
  font-style: normal;
}

-->
<style>
  *{margin:0; padding:0; box-sizing: border-box;}
  .exam{
    /* 브라우저 수평 수직 가득 사용하기 */
    width:100%; height: 100vh;
    background-color: #ccc;
    /* 4. 인라인 .text-wrap 수평정렬*/
    text-align: center;
    /* 6. 자식의 수직 정렬을 가운데 */
    align-content: center;

    /* 그라디언트 */
                background: 
                radial-gradient(ellipse at 20% 30%, rgba(0, 255, 255, 0.6) 0%, transparent 40%),
                radial-gradient(ellipse at 80% 20%, rgba(255, 0, 255, 0.6) 0%, transparent 40%),
                radial-gradient(ellipse at 50% 70%, rgba(231, 202, 14, 0.6) 0%, transparent 40%),
                radial-gradient(ellipse at 70% 60%, rgba(128, 0, 255, 0.5) 0%, transparent 50%),
                radial-gradient(ellipse at 30% 60%, rgba(0, 255, 150, 0.4) 0%, transparent 45%),
                radial-gradient(ellipse at 60% 40%, rgba(255, 0, 127, 0.4) 0%, transparent 45%),
                linear-gradient(135deg, rgba(30, 10, 50, 0.3) 0%, rgba(20, 40, 60, 0.3) 100%);
            background-size: 200% 200%, 180% 180%, 220% 220%, 200% 200%, 190% 190%, 210% 210%, 100% 100%;
            background-position: 0% 0%, 100% 100%, 0% 100%, 50% 50%, 100% 0%, 0% 50%, 0% 0%;

  }
  .exam .text-wrap{
    /* 3 너비를 자식의 크기만큼만 */
    display: inline-block;
  }
  .exam .text-wrap .title{
    /* 1웹폰트 Nanum Pen Script */
    font-family: "Nanum Pen Script", cursive;
    font-size:200px;
    color:#fff;
    /* 2 자간 */
    letter-spacing: 30px;
    /* 5 텍스트 그림자 */
    text-shadow: 14px 4px 10px rgba(110, 67, 252, 0.8);
  }
  .exam .text-wrap .desc{
    /* 1웹폰트 Nanum Pen Script */
    font-family: "Noto Sans KR", sans-serif;
    font-size:30px;
    margin-top:-50px;
        /* 2 자간 */
    letter-spacing: 9px;
    font-weight: 100;
  }


</style>
</head>
<body>
  <!-- .exam>.text-wrap>div.title+div.desc -->
  <div class="exam">
    <div class="text-wrap">
      <div class="title">SALE</div>
      <div class="desc">여름을 전하는 감사 인사</div>
    </div>
  </div>
</body>
</html>
