<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>transform</title>
  <style>
    *{margin:0; padding:0; box-sizing: border-box;}
    body{margin:50px;}
    .exam-wrap{
      background-color: #3cc;
      border: 1px solid #000;
      padding:30px;
    }
    .img-wrap{
      background-color: beige;
      border: 1px solid #f00;
      width:300px;
      overflow: hidden;
    }
    .img-wrap img{
      /* opacity: 0.5; */
      /* 부모의 너비에 따라 이미지의 크기가 자동으로 조절 */
      width:100%;
      height: auto; /*기본값*/
      display: block;
    }
    .img-wrap:hover img{
      transform:scale(1.5);
      transform-origin:center bottom;
      /* transition 속성지정 */
      transition-duration: 0.5s;
      transition-property: transform;
    }
  </style>
</head>
<body>
  <div class="exam-wrap">
    <div class="img-wrap">
       <img src="../background-image/test-img.png" alt="">
    </div>
  </div>
</body>
</html>
