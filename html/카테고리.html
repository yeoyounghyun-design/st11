<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카테고리 - 목록연습</title>
</head>
<body>
  
  <!--
  ul 순서없는 목록
  li 목록 아이템
  -->
  <!--
  <태그> 내용 </태그>
  내용 : 텍스트 또는 태그
  -->
  
  <nav>
    <ul>
      <!-- 대분류 -->
       <!-- li*5 -->
    <li>Best100</li>
     <li>NEW 10%</li>
    <li>DRESS</li>
    <li>OUTER</li>
    <li>TOP
    <ul>
      <!-- 중분류 -->
      <!-- li*3 -->
      <li>티</li>
       <li>셔츠</li>
       <li>블라우스</li>
    </ul>
    </li>
    <li>BOTTOM
    <!--
    대분류 bottom속한 중분류 아이템이 2개
    -->
    <!-- ul>li*2 -->
    <ul>
      <li>팬츠</li>
      <li>스커트</li>
    </ul>
     </li>
    
     </ul>
  </nav>
</body>
</html>
