<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flex에서 margin활용</title>
  <link rel="stylesheet" href="../reset.css">
  <style>
    .container{
      background-color: #ccc;
      width:100%; height: 100vh;

      display: flex;
      /* 2 row,  5 nowrap 6gap*/
      /* 7정렬
      주축 
      */
      justify-content: flex-start;
      /*
      교차축 align-items: stretch; 
      교차크기(아이템의 width, height): auto;
      */
    }
    .item{
      /* width: 100px; height: 100px; */
      background-color: magenta;
      /* 3 확장0. 축소1 */
      /* 4 flex-basis:auto; */
      /* flex item이 나의내용크기만큼되겠다 width:auto;*/
      width:100px;
      /*flex item이 stretch일경우 부모의 크기만크 늘어나라를 제외하고는 내 내용크기   height:auto;*/
      height: 100px;
      /* 6 margin */
      /* margin-top:auto; */
      margin:auto;
      /* 플렉스 컨테이너의 남은공간을 바깥여백으로 사용 */
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="item">아이템</div>
 
  </div>
</body>
</html>
