<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flex3-flex container</title>
  <link rel="stylesheet" href="../reset.css">
  <!-- 플렉스 컨테이너 속성 실습을 위해서
    아이템의 확장x, 축소x 
  -->
  <!-- 
  1. flex 선언   container
  2. flex의 방향을 결정  container
  3. 아이템의 축소/확장을 결정 item
  4. 아이템의 크기결정 item
  5. 아이템이 줄바꿈을 결정 container
  6. 여백관리 gap container  margin item
  7. 정렬  container / item  , margin
  -->
  <style>
    .wrap{margin:50px}
    .container{
      background-color: #fcc;

    }
    .item{
      border: 1px solid #000;
    }
    
    .flex{
       width:300px;
       height: 300px;
      /* 1. flex 컨테이너 선언 ; 단이 될 요소의부모 */
      display: flex;
       /* 2. flex의 방향을 결정  container  주축,교차축 결정*/
       flex-direction: row;
       /* 전제조건 아이템확장? 아이템축소x */
       /*
        5. flex-wrap
        아이템이 줄바꿈을 결정 container
       플렉스 컨테이너 안에서   flex아이템의 합이 플렉스 컨테이너 보다 클경우 줄바꿈
       */
       flex-wrap: wrap;
       /* 6. 여백관리 gap container  margin item 
       gap, justify-content, align-content를 같이 지정하면 원하는 레이아웃을 못얻을 수 있어요
       */
  
       column-gap:1rem;
       row-gap: 10px;
       /* 7. 정렬  container / item  , margin */
       /* 7-1 주축의 정렬 */
       justify-content: start;
       /* 7-2 교자축의 정렬 */
       /* 7-2-1 여러줄의 정렬 align-content*/
       /* 7-2-2 한줄 정렬 align-items */
       /* 플렉스 컨테이너의 교차축크기의 맞춰서 늘어나라 */
       /* align-content: stretch;  */
       align-content: start;


    }
    .flex .item{
        /* 3. 아이템의 축소/확장을 결정 item */
        flex-grow: 0;
        flex-shrink: 0;
        /*  4. 아이템의 크기결정 item */
        width:80px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- .container>.item*4>{item$} -->
    <div class="container flex">
      <div class="item">item1</div>
      <div class="item">item2</div>
      <div class="item">item3</div>
      <div class="item">item4</div>
    </div>
  </div>
</body>
</html>
