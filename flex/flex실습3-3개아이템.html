<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flex실습3 3개의 아이템- 양끝정렬+가운데</title>
  <link rel="stylesheet" href="../reset.css">
    <!-- 
  1. flex 선언   container
  2. flex의 방향을 결정  container
  3. 아이템의 축소/확장을 결정 item
  4. 아이템의 크기결정 item
  5. 아이템이 줄바꿈을 결정 container
  6. 여백관리 gap container  margin item
  7. 정렬  container / item  , margin
  -->
  <style>
    /* 모양 */
    .inner{background-color: #ccc;}
    #top_nav_box{background-color: #fcc; box-sizing: border-box;}
    #top_nav_box>div{box-sizing: border-box; padding: 0.5rem;}
    #top_nav_box .top_logo{background-color: beige;}
    #top_nav_box .top_category{background-color: dodgerblue;}
    #top_nav_box .top_mypage{background-color: purple;}

    /* 크기 */
    /* #top_nav_box .top_logo{ width:100px}
    #top_nav_box .top_category{min-width:600px; max-width:700px}
    #top_nav_box .top_mypage{width:150px} */
    /* flex */
    .inner{
      display: flex;
      /* 2row 5nowrap  */
    }
    #top_nav_box{
      /* flex 아이템 */
      /* 3 확장0/축소1 */
      /* 4flex-basis:auto  */
      width:100%;

      display: flex;
      /* 2방향row 5 줄바꿈nowrap */
      /* 7정렬 주축*/
      /* 아이템사이만 컨텐이너의 남은 공간을 동일하게 여백으로 사용하고 싶어요 */
      justify-content: space-between;
    }
    #top_nav_box>div{
      /* flex item */
      /* 3확장0, 축소1 */
      /* 4 flex-basis:auto */
    }
    #top_nav_box .top_logo{ width:100px}
    #top_nav_box .top_category{min-width:600px; max-width:700px}
    #top_nav_box .top_mypage{width:150px}
  </style>
</head>
<body>
  <div class="inner">
    <div class="top_nav_box" id="top_nav_box">
      <div class="top_logo">로고</div>
      <div class="top_category">카테고리</div>
      <div class="top_mypage">마이페이지</div>
    </div>
    <!-- //#top_nav_box -->
  </div>
  <!-- //.inner -->
</body>
</html>
