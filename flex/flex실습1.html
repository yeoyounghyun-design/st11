<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flex1 수직 수평 가운데 정렬</title>
  <link rel="stylesheet" href="../reset.css">
  <style>
    .visual-section{
      display: flex;
      background-color: #ffc;
      /* viewport를 가득 채운 visual-section 크기 */
      box-sizing: border-box;
      width:100%; /*스크롤바를 제외한 크기*/
      height: 100vh;
      /* 2.방향*/
      /* 5줄바꿈 */
      /* 6여백 */
      /* 7정렬 */
      /* justify-content: flex-start;
      align-items: stretch; */
      justify-content: center;
      align-items: center;

    }
    .visual-section .text-wrap{
      /* flex item */
      background-color: #cff;
      /* 3 확장/축소 */
      /* flex-grow: 0;
      flex-shrink: 1; */
      flex:none;
      /* 4 크기 */
      width:50%;
      min-width:  300px;
      max-width: 500px;
      box-sizing: border-box;
      padding:1rem 2rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="visual-section">
      <div class="text-wrap">
        <div class="title">Title</div>
        <div class="desc">Lorem ipsum dolor sit amet consectetur adipisicing elit. Nihil voluptatum placeat illo neque numquam aliquam eos eligendi modi rem nam!</div>
      </div>
    </div>
  </div>
</body>
</html>
