<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flex5-flex item크기</title>
  <link rel="stylesheet" href="../reset.css">
    <!-- 
  1. flex 선언   container
  2. flex의 방향을 결정  container row가 기본값
  3. 아이템의 축소/확장을 결정 item 축소0 확장x
  4. 아이템의 크기결정 item
  5. 아이템이 줄바꿈을 결정 container
  6. 여백관리 gap container  margin item
  7. 정렬  container / item  , margin
  -->
  <style>
    .wrap{margin:50px}
    .container{
      background-color: #fcc;
    }
    .item{
      border: 1px solid #000;
    }
    
    .flex{
      display: flex;
      /* 2 방향*/
      /* flex-direction: row; */
      /* 5 줄바꿈*/
      /* flex-wrap: nowrap; */
      /* 6 여백*/
      gap:1rem;
      /* 7 정렬 */
      /* 주축 justify-content */
      /* justify-content: flex-start; */
      /* 교차축 align-content */
      /* align-content: stretch; */
    }
    .flex .item{
      /* 3 */
      /* flex-grow: 0; */
      flex-grow: 0;
      /* flex-shrink: 1; */
      flex-shrink: 0;
      /* flex-basis: auto; */
      /* 4 크기 
        flex-basis> width, heigtht
        단 제외사항  flex-basis:atuo; 기본값
        widht:값; height:값
          width: calc(아이템크기% - (여백 * (단 - 1) / 단)); 
      */
      width: calc(25% - (10px * (4 - 1) / 4)); 
      height: auto;
    }
   .flex .item:nth-child(1){order:3;}
   .flex .item:nth-child(2){order:2;}
   .flex .item:nth-child(3){order:1;}
   .flex .item:nth-child(4){order:4;}
  </style>
</head>
<body>
  <div class="wrap">
    <!-- .container>.item*4>{item$} -->
    <div class="container flex">
      <div class="item">item1</div>
      <div class="item">item2</div>
      <div class="item">item3</div>
      <div class="item">item4</div>
    </div>
  </div>
</body>
</html>
