<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flex3-flex container</title>
  <link rel="stylesheet" href="../reset.css">
  <!-- 플렉스 컨테이너 속성 실습을 위해서
    아이템의 확장x, 축소x 
  -->
  <!-- 
  1. flex 선언   container
  2. flex의 방향을 결정  container
  3. 아이템의 축소/확장을 결정 item
  4. 아이템의 크기결정 item
  5. 아이템이 줄바꿈을 결정 container
  6. 여백관리 gap container  margin item
  7. 정렬  container / item  , margin
  -->
  <style>
    .wrap{margin:50px}
    .container{
      background-color: #fcc;

    }
    .item{
      border: 1px solid #000;
    }
    
    .flex1{
       width:300px;
       height: 150px;
      
      display: flex;
       flex-direction: row;
      
       flex-wrap: wrap;
     
  
       column-gap:1rem;
       row-gap: 10px;
      
       justify-content: start;
  
       align-content: start;
       margin-bottom: 50px;


    }
    .flex1 .item{
        
        flex-grow: 0;
        flex-shrink: 0;
       
        width:80px;
    }

    /* flex2 */
    .flex2{
      /* 1  */
      display: flex;
       /* 실습을 위해서 */
      width:300px; height: 150px;
      /* 2 아이템이 진행하는 방향 */
      /* flex-direction: row; */
      flex-direction: column;

      /* 5 아이템의 합이 컨테이너이 크기보다 클경우 
      flex-wrap: wrap;
      아이템에 flex-shrink:0;설정
      */
      flex-wrap: wrap;
      /* 6 */
      /* gap과 justify-content를 함께 지정하면 원하는 레이아웃 안나올 수 있어요 */
      /* gap:1rem; */
      /* 7 */
      /* 주축정렬 */
      justify-content: space-evenly;
      /* 교차축의 정렬 */
      align-content: space-evenly;
    
    }
    .flex2 .item{
      /* 3 */
      flex-grow: 0;
      flex-shrink: 0;
      /* 4 width bias */
      width:80px;
      /* 단처리를 위한 % */
      /* width:calc(33.33% - (1rem * (3 - 1) / 3)); */
      height: 60px;
      box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <!-- .container>.item*4>{item$} -->
    <div class="container flex1">
      <div class="item">item1</div>
      <div class="item">item2</div>
      <div class="item">item3</div>
      <div class="item">item4</div>
    </div>
    <div class="container flex2">
      <div class="item">item1</div>
      <div class="item">item2</div>
      <div class="item">item3</div>
      <div class="item">item4</div>
    </div>
  </div>
</body>
</html>
