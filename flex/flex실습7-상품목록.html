<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flex실습7-상품목록</title>
  <link rel="stylesheet" href="../reset.css">
  <style>
  /* 모양 */
  .ec-base-product{background-color: #ccc;}
  .ec-base-product .prdlist{background-color: #fcc;}
  .ec-base-product .prdlist >li{
    opacity: 0.5;
    box-sizing: border-box;
    border: 1px solid #000;
    background-color: #cff;
    padding: 1rem;
  } 

  /* flex */
  .ec-base-product{}
  /* flex container .prdlist */
  .ec-base-product .prdlist{
    display: flex;
  /* 2 flex-direction: row; */
  /* 5 */
  flex-wrap: wrap;
  /* 6 */
  gap: 20px;
  }

  /* flexitem widwth:auto; height:auto
  내용의 크기만큼만 요소의 크기가 되어라 */
  /* flex item .prdlist */
  /* pc4, table :3, */
  .ec-base-product .prdlist >li{
    /* 3
    flex-grow: 0;
   
    */
    /* 4 flex-basis: autp;, width(row) height(column) */
     flex-shrink: 0;
    width:calc(25% - (20px *(4-1) / 4) );
    aspect-ratio: 2/1;
  } 

  @media (max-width:1024px){
    /* table:3 */
    .ec-base-product .prdlist >li{
      width: calc(33.33% - (20px *(3 - 1) / 3));
    }
  }

  @media (max-width:768px){
    /* m:2 */
    .ec-base-product .prdlist >li{
      width: calc(50% - (20px *(2 - 1) / 2));
    }
  } /*@media (max-width:1024px)*/
  </style>
</head>

 <div class="ec-base-product">
 <ul class="prdlist">
  <!-- li*8>{아이템$} -->
  <li>아이템1</li>
  <li>아이템2</li>
  <li>아이템3</li>
  <li>아이템4</li>
  <li>아이템5</li>
  <li>아이템6</li>
  <li>아이템7</li>
  <li>아이템8</li>
 </ul>
 </div>
</body>
</html>
